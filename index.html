<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Maze Race - Arcade Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
--mario: #ff4d4d;
--luigi: #2ecc71;
--peach: #f8a5c2;
--wario: #f1c40f;
--waluigi: #a29bfe;
}
* { font-family: 'Press Start 2P', cursive; box-sizing: border-box; }

body {
background-color: #5c94fc;
margin: 0;
overflow: hidden;
color: white;
}

/* Pixel art style buttons */
.arcade-btn {
box-shadow: -4px 4px 0px 0px rgba(0,0,0,1);
transition: all 0.1s;
}
.arcade-btn:active {
transform: translate(-2px, 2px);
box-shadow: -2px 2px 0px 0px rgba(0,0,0,1);
}

.track-bg {
background: linear-gradient(to bottom, #5c94fc 0%, #5c94fc 70%, #2ecc71 70%, #2ecc71 75%, #8B4513 75%);
}

.character-svg { width: 80px; height: 80px; image-rendering: pixelated; }

@keyframes coin-bounce {
0% { transform: translateY(0) scale(1); opacity: 1; }
100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
}
.coin-fx {
position: absolute;
animation: coin-bounce 0.6s ease-out forwards;
pointer-events: none;
}

.jump { animation: jump-anim 0.4s ease-out; }
@keyframes jump-anim {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-60px); }
}

#bg-clouds {
position: fixed;
top: 0; left: 0; width: 100%; height: 50%;
z-index: 0; opacity: 0.5;
pointer-events: none;
}

.option-btn {
background: #f1c40f;
border: 4px solid #000;
color: #000;
padding: 15px 10px;
font-size: 0.7rem;
text-align: center;
cursor: pointer;
}
.option-btn:hover { background: #f39c12; }

/* Custom Scrollbar for Editor */
.custom-scroll::-webkit-scrollbar { width: 10px; }
.custom-scroll::-webkit-scrollbar-track { background: #333; }
.custom-scroll::-webkit-scrollbar-thumb { background: #ff0000; }
</style>
</head>
<body>

<!-- Background Decoration -->
<svg id="bg-clouds" viewBox="0 0 1000 500">
<path d="M100,100 Q120,80 140,100 Q160,80 180,100 Q200,80 220,100 L220,130 L100,130 Z" fill="white" opacity="0.8"/>
<path d="M500,150 Q520,130 540,150 Q560,130 580,150 Q600,130 620,150 L620,180 L500,180 Z" fill="white" opacity="0.8"/>
<path d="M800,80 Q820,60 840,80 Q860,60 880,80 Q900,60 920,80 L920,110 L800,110 Z" fill="white" opacity="0.8"/>
</svg>

<!-- Mute Toggle -->
<button onclick="toggleMute()" class="fixed top-5 right-5 z-[3000] bg-white border-4 border-black p-2 rounded-lg text-black arcade-btn">
<span id="mute-icon">🔊</span>
</button>

<!-- Title Screen -->
<div id="title-screen" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-black/70">
<h1 class="text-6xl md:text-8xl font-bold text-center mb-10 drop-shadow-[0_10px_0_rgba(255,0,0,1)]">
MEGA<br><span class="text-yellow-400">MAZE RACE</span>
</h1>
<div class="flex flex-col gap-4">
<button onclick="openSelection()" class="arcade-btn bg-red-600 text-white px-10 py-5 text-2xl border-4 border-white">PRESS START</button>
<button onclick="openEditor()" class="arcade-btn bg-gray-700 text-white px-6 py-3 text-sm border-4 border-white">QUESTION EDITOR</button>
</div>
</div>

<!-- Character Selection -->
<div id="select-screen" class="fixed inset-0 z-[1100] hidden flex flex-col items-center justify-center bg-black/80 p-4">
<h2 class="text-3xl mb-8">SELECT YOUR RACER</h2>
<div class="flex flex-wrap justify-center gap-10 bg-white p-8 border-8 border-black text-black">
<div class="flex flex-col items-center">
<h3 class="mb-4 text-red-600">PLAYER 1</h3>
<div id="grid1" class="grid grid-cols-2 gap-4"></div>
</div>
<div class="flex flex-col items-center">
<h3 class="mb-4 text-green-600">PLAYER 2</h3>
<div id="grid2" class="grid grid-cols-2 gap-4"></div>
</div>
</div>
<button id="race-btn" onclick="startRace()" class="hidden arcade-btn mt-8 bg-red-600 px-10 py-5 text-2xl border-4 border-white">IT'S GO TIME!</button>
</div>

<!-- Editor Screen -->
<div id="editor-screen" class="fixed inset-0 z-[1200] hidden flex flex-col items-center justify-center bg-zinc-900 p-6">
<h2 class="text-2xl mb-4">MAP EDITOR (QUESTIONS)</h2>
<div id="editor-list" class="w-full max-w-2xl h-[60vh] overflow-y-auto bg-white border-8 border-red-600 p-4 custom-scroll space-y-6"></div>
<div class="flex gap-4 mt-6">
<button onclick="addQuestion()" class="arcade-btn bg-green-600 px-6 py-3 text-sm border-2 border-white">+ ADD NEW</button>
<button onclick="closeEditor()" class="arcade-btn bg-blue-600 px-6 py-3 text-sm border-2 border-white">SAVE & BACK</button>
</div>
</div>

<!-- Main Game Interface -->
<div id="game-container" class="hidden fixed inset-0 z-[500] flex flex-col">
<!-- Race Tracks -->
<div class="flex-none h-[50vh] flex flex-col">
<div id="track-p1" class="relative flex-1 track-bg border-b-4 border-black/20 overflow-hidden">
<div id="p1-sprite" class="absolute bottom-[25%] left-0 z-10"></div>
<!-- Finish Line -->
<div class="absolute right-0 h-full w-20 border-l-8 border-dashed border-white/50 bg-black/10 flex items-center justify-center">
<span class="rotate-90 text-[10px] opacity-30">FINISH</span>
</div>
</div>
<div id="track-p2" class="relative flex-1 track-bg overflow-hidden">
<div id="p2-sprite" class="absolute bottom-[25%] left-0 z-10"></div>
<div class="absolute right-0 h-full w-20 border-l-8 border-dashed border-white/50 bg-black/10 flex items-center justify-center">
<span class="rotate-90 text-[10px] opacity-30">FINISH</span>
</div>
</div>
</div>

<!-- Quiz Area -->
<div class="flex-1 bg-black p-4 flex gap-4 overflow-hidden">
<div id="p1-ui" class="flex-1 bg-white border-8 border-red-500 p-4 flex flex-col justify-between text-black rounded-sm">
<div>
<h3 id="p1-label" class="text-sm border-b-4 border-red-100 mb-2">P1</h3>
<p id="p1-q" class="text-[0.65rem] leading-loose mb-4 h-16 overflow-y-auto"></p>
</div>
<div id="p1-opts" class="grid grid-cols-2 gap-2"></div>
</div>
<div id="p2-ui" class="flex-1 bg-white border-8 border-green-500 p-4 flex flex-col justify-between text-black rounded-sm">
<div>
<h3 id="p2-label" class="text-sm border-b-4 border-green-100 mb-2">P2</h3>
<p id="p2-q" class="text-[0.65rem] leading-loose mb-4 h-16 overflow-y-auto"></p>
</div>
<div id="p2-opts" class="grid grid-cols-2 gap-2"></div>
</div>
</div>
</div>

<!-- Victory Screen -->
<div id="victory-screen" class="fixed inset-0 z-[2000] hidden flex flex-col items-center justify-center bg-black text-center p-10">
<h1 id="winner-text" class="text-5xl md:text-7xl mb-10">WINNER!</h1>
<div id="winner-display" class="scale-[2.5] mb-20"></div>
<button onclick="location.reload()" class="arcade-btn bg-white text-black px-10 py-5 text-xl border-4 border-red-600">REPLAY</button>
</div>

<script>
// --- ASSET GENERATION (SVGs) ---

const mainColor = colors[type] || color;
return `
<svg class="character-svg" viewBox="0 0 100 100">

<rect x="35" y="40" width="10" height="10" fill="black" /> <!-- Eye L -->
<rect x="55" y="40" width="10" height="10" fill="black" /> <!-- Eye R -->
<rect x="30" y="60" width="40" height="30" fill="${mainColor}" /> <!-- Body -->
<rect x="20" y="65" width="10" height="20" fill="${mainColor}" /> <!-- Arm L -->
<rect x="70" y="65" width="10" height="20" fill="${mainColor}" /> <!-- Arm R -->
</svg>
`;
};

<rect x="45" y="20" width="10" height="60" fill="#b7950b" />
</svg>
`;
